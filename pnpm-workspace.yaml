packages:
  - 'packages/*'
  - 'apps/*'
minimumReleaseAgeExclude:
  - ai@6.0.208
allowBuilds:
  '@biomejs/biome': true
  esbuild: true
# Install both CPU arches of the current OS's native deps so a single runner can
# cross-build both arch binaries (e.g. an Apple-Silicon runner builds darwin-x64
# too — Intel macOS CI runners are scarce). No-op for the binary's own arch.
supportedArchitectures:
  cpu:
    - arm64
    - x64
