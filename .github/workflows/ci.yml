name: ci

# Gate every push and PR on typecheck + tests + lint. The suite already exists
# (67 vitest files); this workflow is what makes it actually run before merge.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · test · lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4 # version read from package.json "packageManager"
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # pnpm 11.5.1 needs Node >= 22.13 (uses node:sqlite)
          cache: pnpm
      - uses: oven-sh/setup-bun@v2 # the cli test runs `bun test src/tui-otui` (OpenTUI/Solid)

      - run: pnpm install --frozen-lockfile
      - run: pnpm build # build workspace libs so cross-package imports type-resolve
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm lint
